<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200, height=1200">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');
  body {
    width: 1200px; height: 1200px; overflow: hidden;
    background: linear-gradient(160deg, #0d1117 0%, #1a2332 50%, #0f2027 100%);
    font-family: 'Inter', -apple-system, sans-serif;
    color: #c9d1d9;
    display: flex; align-items: center; justify-content: center;
  }
  .container {
    width: 100%; height: 100%; padding: 80px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 30px;
    text-align: center;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(39, 174, 96, 0.15);
    border: 1px solid rgba(39, 174, 96, 0.4);
    border-radius: 24px; padding: 8px 22px;
    font-size: 16px; color: #27ae60; font-weight: 600;
  }
  h1 {
    font-size: 64px; font-weight: 800; color: #e6edf3;
    line-height: 1.15; letter-spacing: -0.02em;
  }
  h1 span { color: #27ae60; }
  .subtitle {
    font-size: 22px; color: #8b949e; max-width: 600px; line-height: 1.5;
  }
  .mini-grid {
    display: flex; flex-direction: column; gap: 4px;
    background: #161b22; border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    padding: 20px 24px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.3);
  }
  .mini-row {
    display: flex; gap: 4px;
  }
  .mini-cell {
    width: 40px; height: 36px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }
  .done { background: rgba(39,174,96,0.25); color: #27ae60; }
  .missed { background: rgba(231,76,60,0.2); color: #e74c3c; }
  .future { background: rgba(255,255,255,0.04); }
  .price-tag {
    display: inline-flex; align-items: center; gap: 14px;
    background: rgba(39, 174, 96, 0.12);
    border: 1px solid rgba(39, 174, 96, 0.3);
    border-radius: 14px; padding: 14px 30px;
  }
  .price-tag .price { font-size: 32px; font-weight: 800; color: #27ae60; }
  .price-tag .sep { color: rgba(255,255,255,0.2); font-size: 24px; }
  .price-tag .label { font-size: 16px; color: #8b949e; font-weight: 500; }
</style>
</head>
<body>
<div class="container">
  <div class="badge">Google Sheets Template</div>
  <h1>30-Day<br><span>Habit Tracker</span></h1>
  <p class="subtitle">Build better habits with streaks, dashboards, and weekly reviews.</p>
  <div class="mini-grid">
    <div class="mini-row">
      <div class="mini-cell done">1</div><div class="mini-cell done">1</div><div class="mini-cell done">1</div>
      <div class="mini-cell missed">0</div><div class="mini-cell done">1</div><div class="mini-cell done">1</div>
      <div class="mini-cell done">1</div><div class="mini-cell done">1</div><div class="mini-cell done">1</div>
      <div class="mini-cell done">1</div>
    </div>
    <div class="mini-row">
      <div class="mini-cell done">1</div><div class="mini-cell done">1</div><div class="mini-cell done">1</div>
      <div class="mini-cell done">1</div><div class="mini-cell done">1</div><div class="mini-cell missed">0</div>
      <div class="mini-cell done">1</div><div class="mini-cell done">1</div><div class="mini-cell done">1</div>
      <div class="mini-cell done">1</div>
    </div>
    <div class="mini-row">
      <div class="mini-cell done">1</div><div class="mini-cell done">1</div><div class="mini-cell done">1</div>
      <div class="mini-cell done">1</div><div class="mini-cell done">1</div><div class="mini-cell done">1</div>
      <div class="mini-cell done">1</div><div class="mini-cell done">1</div><div class="mini-cell done">1</div>
      <div class="mini-cell done">1</div>
    </div>
  </div>
  <div class="price-tag">
    <span class="price">$13.99</span>
    <span class="sep">|</span>
    <span class="label">Instant Download</span>
  </div>
</div>
</body>
</html>
