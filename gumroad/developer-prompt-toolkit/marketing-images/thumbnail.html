<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 600px; height: 600px;
    background: #0d1117;
    font-family: 'Inter', sans-serif;
    color: #e6e6e6;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .bg-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(122,162,247,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(122,162,247,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .glow {
    position: absolute;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(122,162,247,0.1) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .content { position: relative; z-index: 1; text-align: center; padding: 40px; }
  .badge {
    display: inline-block;
    background: rgba(122,162,247,0.12);
    border: 1px solid rgba(122,162,247,0.25);
    color: #7aa2f7;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 14px;
    margin-bottom: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  h1 {
    font-size: 36px;
    font-weight: 800;
    line-height: 1.15;
    margin-bottom: 16px;
    letter-spacing: -0.5px;
  }
  h1 span { color: #7aa2f7; }
  .count {
    font-size: 64px;
    font-weight: 800;
    color: #9ece6a;
    line-height: 1;
    margin-bottom: 4px;
    text-shadow: 0 0 40px rgba(158,206,106,0.3);
  }
  .count-label {
    font-size: 16px;
    font-weight: 600;
    color: #565f89;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 24px;
  }
  .terminal {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 12px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    text-align: left;
    max-width: 400px;
  }
  .terminal .sym { color: #9ece6a; }
  .terminal .ph { color: #ff9e64; }
</style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow"></div>
  <div class="content">
    <div class="badge">Developer Toolkit</div>
    <h1><span>AI Prompt</span><br>Toolkit</h1>
    <div class="count">222</div>
    <div class="count-label">Prompts</div>
    <div class="terminal">
      <span class="sym">$</span> debug <span class="ph">{{ERROR}}</span> with best practices
    </div>
  </div>
</body>
</html>
