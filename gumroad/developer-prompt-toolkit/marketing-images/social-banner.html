<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px;
    background: #0d1117;
    font-family: 'Inter', sans-serif;
    color: #e6e6e6;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .bg-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(122,162,247,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(122,162,247,0.04) 1px, transparent 1px);
    background-size: 50px 50px;
  }
  .glow {
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(122,162,247,0.1) 0%, transparent 70%);
    top: 50%; left: 30%;
    transform: translate(-50%, -50%);
  }
  .content {
    position: relative; z-index: 1;
    display: flex; align-items: center; gap: 60px;
    padding: 0 80px;
  }
  .left { flex: 1; }
  .right {
    display: flex; flex-direction: column; align-items: center;
  }
  .badge {
    display: inline-block;
    background: rgba(158,206,106,0.12);
    border: 1px solid rgba(158,206,106,0.25);
    color: #9ece6a;
    font-size: 13px; font-weight: 700;
    padding: 5px 14px; border-radius: 16px;
    margin-bottom: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  h1 {
    font-size: 52px; font-weight: 800;
    line-height: 1.1; margin-bottom: 16px;
    letter-spacing: -1px;
  }
  h1 span { color: #7aa2f7; }
  .sub {
    font-size: 20px; color: #8b949e;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1.5;
  }
  .sub strong { color: #9ece6a; font-weight: 500; }
  .big-number {
    font-size: 120px; font-weight: 800;
    color: #7aa2f7;
    line-height: 1;
    margin-bottom: 8px;
    text-shadow: 0 0 60px rgba(122,162,247,0.3);
  }
  .big-label {
    font-size: 20px; font-weight: 700;
    color: #565f89;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow"></div>
  <div class="content">
    <div class="left">
      <div class="badge">Developer Toolkit</div>
      <h1>The Developer's<br><span>AI Prompt Toolkit</span></h1>
      <div class="sub">For <strong>ChatGPT</strong>, <strong>Claude</strong> &amp; <strong>Ollama</strong></div>
    </div>
    <div class="right">
      <div class="big-number">222</div>
      <div class="big-label">Prompts</div>
    </div>
  </div>
</body>
</html>
