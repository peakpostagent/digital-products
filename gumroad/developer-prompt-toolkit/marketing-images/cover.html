<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px;
    background: #0d1117;
    font-family: 'Inter', sans-serif;
    color: #e6e6e6;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .bg-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(122,162,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(122,162,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .glow {
    position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(122,162,247,0.08) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .content { position: relative; z-index: 1; text-align: center; }
  .badge {
    display: inline-block;
    background: rgba(122,162,247,0.12);
    border: 1px solid rgba(122,162,247,0.25);
    color: #7aa2f7;
    font-size: 14px;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 20px;
    margin-bottom: 28px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  h1 {
    font-size: 56px;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 16px;
    letter-spacing: -1px;
  }
  h1 span { color: #7aa2f7; }
  .subtitle {
    font-size: 24px;
    color: #9ece6a;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    margin-bottom: 40px;
  }
  .terminal {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 20px 28px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    text-align: left;
    max-width: 700px;
    margin-bottom: 40px;
  }
  .terminal .prompt-symbol { color: #9ece6a; }
  .terminal .placeholder { color: #ff9e64; background: rgba(255,158,100,0.1); padding: 1px 4px; border-radius: 3px; }
  .terminal .comment { color: #565f89; }
  .compat {
    display: flex; gap: 24px; justify-content: center;
  }
  .compat span {
    font-size: 14px;
    color: #565f89;
    font-weight: 600;
    padding: 6px 14px;
    border: 1px solid #30363d;
    border-radius: 8px;
    background: rgba(22,27,34,0.8);
  }
</style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow"></div>
  <div class="content">
    <div class="badge">Developer Toolkit</div>
    <h1>The Developer's<br><span>AI Prompt Toolkit</span></h1>
    <div class="subtitle">222 Battle-Tested Prompts</div>
    <div class="terminal">
      <span class="comment"># Debug any stack trace in seconds</span><br>
      <span class="prompt-symbol">$</span> analyze <span class="placeholder">{{ERROR_LOG}}</span> using <span class="placeholder">{{LANGUAGE}}</span> best practices
    </div>
    <div class="compat">
      <span>ChatGPT</span>
      <span>Claude</span>
      <span>Ollama</span>
    </div>
  </div>
</body>
</html>
