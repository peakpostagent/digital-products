<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=600, height=600">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  body {
    width: 600px; height: 600px; overflow: hidden;
    background: #0d1117;
    font-family: 'Inter', -apple-system, sans-serif;
    color: #c9d1d9;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    text-align: center;
  }
  .icon {
    width: 80px;
    height: 80px;
    background: rgba(122,162,247,0.15);
    border: 2px solid rgba(122,162,247,0.3);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    margin-bottom: 24px;
  }
  h1 {
    font-size: 32px;
    font-weight: 800;
    color: #e6edf3;
    line-height: 1.15;
    margin-bottom: 12px;
  }
  h1 span { color: #7aa2f7; }
  .subtitle {
    font-size: 15px;
    color: #8b949e;
    line-height: 1.5;
    margin-bottom: 28px;
    max-width: 420px;
  }
  .features {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 28px;
  }
  .feature {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 12px;
    color: #c9d1d9;
    font-weight: 500;
  }
  .price {
    font-size: 44px;
    font-weight: 800;
    color: #9ece6a;
  }
  .price-sub {
    font-size: 13px;
    color: #8b949e;
    margin-top: 4px;
  }
</style>
</head>
<body>
  <div class="icon">&#128202;</div>
  <h1>Freelancer's<br><span>Business-in-a-Box</span></h1>
  <p class="subtitle">Complete Google Sheets system for freelancers</p>
  <div class="features">
    <div class="feature">CRM</div>
    <div class="feature">Pipeline</div>
    <div class="feature">Invoices</div>
    <div class="feature">Income</div>
    <div class="feature">Rates</div>
    <div class="feature">Proposals</div>
    <div class="feature">Dashboard</div>
  </div>
  <div class="price">$29</div>
  <div class="price-sub">One-time purchase</div>
</body>
</html>
