<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=600, height=600">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  body {
    width: 600px; height: 600px; overflow: hidden;
    background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #1a365d 100%);
    font-family: 'Inter', -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    text-align: center;
    padding: 50px;
  }
  .icon {
    width: 80px; height: 80px;
    background: rgba(122, 162, 247, 0.15);
    border: 2px solid rgba(122, 162, 247, 0.4);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
  }
  .icon svg { width: 40px; height: 40px; color: #7aa2f7; }
  h1 {
    font-size: 36px;
    font-weight: 800;
    color: #e6edf3;
    line-height: 1.15;
    margin-bottom: 16px;
    letter-spacing: -0.5px;
  }
  h1 span { color: #7aa2f7; }
  .subtitle {
    font-size: 15px;
    color: #8b949e;
    line-height: 1.5;
    margin-bottom: 30px;
  }
  .tags {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .tag {
    background: rgba(158, 206, 106, 0.15);
    border: 1px solid rgba(158, 206, 106, 0.3);
    color: #9ece6a;
    padding: 6px 14px;
    border-radius: 16px;
    font-size: 12px;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>
    </div>
    <h1>Developer<br><span>Project Estimator</span></h1>
    <p class="subtitle">Timeline. Cost. Scope.<br>One spreadsheet.</p>
    <div class="tags">
      <span class="tag">6 Tabs</span>
      <span class="tag">40+ Formulas</span>
      <span class="tag">Gantt Chart</span>
    </div>
  </div>
</body>
</html>
