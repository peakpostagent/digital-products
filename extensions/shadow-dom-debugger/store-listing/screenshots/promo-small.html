<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=440, height=280">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
  body {
    width: 440px; height: 280px; overflow: hidden;
    background: linear-gradient(135deg, #1e1e2e 0%, #181825 50%, #2e1065 100%);
    font-family: 'Inter', sans-serif;
    display: flex; align-items: center; justify-content: center;
    padding: 30px 36px; gap: 28px;
  }
  .left { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(192,132,252,0.15); border: 1px solid rgba(192,132,252,0.4);
    border-radius: 12px; padding: 3px 10px;
    font-size: 9px; color: #c084fc; font-weight: 600; width: fit-content;
  }
  h1 { font-size: 22px; font-weight: 800; color: #cdd6f4; line-height: 1.15; }
  h1 span { color: #c084fc; }
  .subtitle { font-size: 11px; color: #6c7086; line-height: 1.4; }
  .right { width: 120px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .icon-mock {
    width: 90px; height: 90px; border-radius: 18px;
    background: linear-gradient(135deg, #c084fc 0%, #7c3aed 100%);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    box-shadow: 0 12px 40px rgba(124,58,237,0.4);
  }
  .shadow-box {
    width: 32px; height: 32px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 5px; position: absolute;
    top: 16px; left: 16px;
  }
  .main-box {
    width: 40px; height: 40px;
    border: 3px solid #fff;
    border-radius: 6px; position: absolute;
    bottom: 16px; right: 16px;
    background: rgba(255,255,255,0.1);
  }
</style>
</head>
<body>
  <div class="left">
    <div class="badge">Developer Tool</div>
    <h1>Shadow DOM<br><span>Debugger</span></h1>
    <p class="subtitle">Find, highlight &amp; inspect Shadow DOM on any page.</p>
  </div>
  <div class="right">
    <div class="icon-mock">
      <div class="shadow-box"></div>
      <div class="main-box"></div>
    </div>
  </div>
</body>
</html>
