<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=440, height=280">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
  body {
    width: 440px; height: 280px; overflow: hidden;
    background: linear-gradient(135deg, #1e1e2e 0%, #181825 100%);
    font-family: 'Inter', sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; text-align: center;
  }
  .icon { font-size: 36px; }
  h1 { font-size: 28px; font-weight: 800; color: #cdd6f4; }
  h1 span { color: #89b4fa; }
  .subtitle { font-size: 13px; color: #6c7086; max-width: 340px; }
  .tags { display: flex; gap: 6px; margin-top: 4px; }
  .tag {
    font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .tag-lcp { background: rgba(12,206,107,0.2); color: #0cce6b; }
  .tag-cls { background: rgba(255,164,0,0.2); color: #ffa400; }
  .tag-inp { background: rgba(137,180,250,0.2); color: #89b4fa; }
</style>
</head>
<body>
  <div class="icon">&#9889;</div>
  <h1>Web Vitals <span>Lite</span></h1>
  <p class="subtitle">Real-time Core Web Vitals on every page.</p>
  <div class="tags">
    <div class="tag tag-lcp">LCP</div>
    <div class="tag tag-cls">CLS</div>
    <div class="tag tag-inp">INP</div>
  </div>
</body>
</html>
