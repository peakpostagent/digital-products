<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=440, height=280">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
  body {
    width: 440px; height: 280px; overflow: hidden;
    background: linear-gradient(135deg, #1e1e2e 0%, #181825 100%);
    font-family: 'Inter', sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; text-align: center;
  }
  .icon { font-size: 36px; }
  h1 { font-size: 28px; font-weight: 800; color: #cdd6f4; }
  h1 span { color: #f38ba8; }
  .subtitle { font-size: 13px; color: #6c7086; max-width: 340px; }
  .tags { display: flex; gap: 6px; margin-top: 4px; }
  .tag {
    font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .tag-limit { background: rgba(243,139,168,0.2); color: #f38ba8; }
  .tag-mock { background: rgba(249,226,175,0.2); color: #f9e2af; }
  .tag-log { background: rgba(166,227,161,0.2); color: #a6e3a1; }
</style>
</head>
<body>
  <div class="icon">&#9202;</div>
  <h1>API Rate <span>Limiter</span></h1>
  <p class="subtitle">Simulate rate limiting for any API endpoint.</p>
  <div class="tags">
    <div class="tag tag-limit">RATE LIMIT</div>
    <div class="tag tag-mock">MOCK 429</div>
    <div class="tag tag-log">REQUEST LOG</div>
  </div>
</body>
</html>
