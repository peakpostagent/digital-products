<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=440, height=280">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
  body {
    width: 440px; height: 280px; overflow: hidden;
    background: linear-gradient(135deg, #1e1e2e 0%, #181825 100%);
    font-family: 'Inter', sans-serif;
    display: flex; align-items: center; justify-content: center;
    padding: 30px;
  }
  .content {
    display: flex; align-items: center; gap: 24px; width: 100%;
  }
  .shield {
    width: 80px; height: 80px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .shield svg { width: 80px; height: 80px; }
  .text { flex: 1; }
  h1 { font-size: 22px; font-weight: 800; color: #cdd6f4; line-height: 1.2; margin-bottom: 6px; }
  h1 span { color: #a6e3a1; }
  p { font-size: 12px; color: #6c7086; line-height: 1.5; }
  .badge {
    display: inline-block; margin-top: 10px;
    font-size: 10px; font-weight: 700; color: #a6e3a1;
    background: rgba(166,227,161,0.12); border: 1px solid rgba(166,227,161,0.3);
    padding: 3px 10px; border-radius: 10px;
  }
</style>
</head>
<body>
  <div class="content">
    <div class="shield">
      <svg viewBox="0 0 100 100">
        <path d="M50 8 L85 25 L85 55 Q85 80 50 95 Q15 80 15 55 L15 25 Z" fill="rgba(166,227,161,0.15)"/>
        <path d="M50 12 L80 27 L80 53 Q80 76 50 90 Q20 76 20 53 L20 27 Z"
              fill="#1e1e2e" stroke="rgba(166,227,161,0.4)" stroke-width="2"/>
        <path d="M36 52 L46 62 L66 38" fill="none" stroke="#a6e3a1" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="text">
      <h1>Security<br><span>Headers</span></h1>
      <p>Inspect HTTP security headers and get an instant letter grade.</p>
      <span class="badge">10 Headers Checked</span>
    </div>
  </div>
</body>
</html>
