<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting Cost Calculator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>Meeting Cost Calculator</h1>
      <p class="subtitle">See the real cost of every meeting</p>
    </header>

    <!-- Rate Configuration -->
    <section class="section">
      <h2 class="section-title">Your Hourly Rate</h2>
      <div class="rate-input-group">
        <select id="currency-select" class="select-input">
          <option value="USD">$ USD</option>
          <option value="EUR">&euro; EUR</option>
          <option value="GBP">&pound; GBP</option>
          <option value="CAD">C$ CAD</option>
          <option value="AUD">A$ AUD</option>
          <option value="JPY">&yen; JPY</option>
          <option value="INR">&#8377; INR</option>
        </select>
        <div class="rate-type-toggle">
          <button id="btn-hourly" class="toggle-btn active" data-type="hourly">Hourly</button>
          <button id="btn-annual" class="toggle-btn" data-type="annual">Annual</button>
        </div>
      </div>

      <div class="input-row">
        <label for="your-rate" id="your-rate-label">Your rate ($/hr)</label>
        <input type="number" id="your-rate" class="number-input" min="0" step="1" placeholder="50">
      </div>

      <div class="input-row">
        <label for="default-rate" id="default-rate-label">Default attendee rate ($/hr)</label>
        <input type="number" id="default-rate" class="number-input" min="0" step="1" placeholder="50">
      </div>
    </section>

    <!-- Save Button -->
    <button id="save-btn" class="save-btn">Save Settings</button>

    <!-- Status Message -->
    <div id="status" class="status hidden"></div>

    <!-- Current Meeting Cost (shown when on Google Calendar) -->
    <section id="current-meeting" class="section meeting-section hidden">
      <h2 class="section-title">Current Event</h2>
      <div id="meeting-info" class="meeting-info">
        <p class="meeting-label">Navigate to a Google Calendar event to see its cost.</p>
      </div>
    </section>

    <!-- Weekly Dashboard -->
    <section id="weekly-dashboard" class="section dashboard-section hidden">
      <h2 class="section-title">Weekly Dashboard</h2>

      <!-- Summary Grid -->
      <div class="summary-grid">
        <div class="summary-item">
          <span class="summary-value" id="dash-total-meetings">0</span>
          <span class="summary-label">Meetings</span>
        </div>
        <div class="summary-item">
          <span class="summary-value" id="dash-total-cost">$0</span>
          <span class="summary-label">Total Cost</span>
        </div>
        <div class="summary-item">
          <span class="summary-value" id="dash-avg-cost">$0</span>
          <span class="summary-label">Avg Cost</span>
        </div>
      </div>

      <!-- Most Expensive & Comparison -->
      <div id="dash-extra-stats" class="dash-extra-stats"></div>

      <!-- Meeting Efficiency Score -->
      <div id="dash-efficiency" class="dash-efficiency hidden">
        <div class="efficiency-bar-container">
          <div class="efficiency-label">Meeting Efficiency</div>
          <div class="efficiency-bar">
            <div class="efficiency-fill" id="dash-efficiency-fill"></div>
          </div>
          <div class="efficiency-value" id="dash-efficiency-value">0%</div>
        </div>
        <div class="efficiency-detail" id="dash-efficiency-detail"></div>
      </div>

      <!-- 4-Week Bar Chart -->
      <div class="chart-container">
        <div class="chart-title">Cost Trend (4 Weeks)</div>
        <div class="chart" id="dash-chart">
          <!-- Bars rendered by JS -->
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <span>Meeting Cost Calculator v1.1.0</span>
    </footer>
  </div>

  <script src="../lib/calculator.js"></script>
  <script src="popup.js"></script>
</body>
</html>
