<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=440, height=280">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap');
  body {
    width: 440px; height: 280px; overflow: hidden;
    background: linear-gradient(135deg, #1e1e2e 0%, #181825 100%);
    font-family: 'Inter', sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; text-align: center;
  }
  .icon {
    font-family: 'JetBrains Mono', monospace;
    font-size: 36px; font-weight: 700; color: #cba6f7;
  }
  h1 { font-size: 28px; font-weight: 800; color: #cdd6f4; }
  h1 span { color: #cba6f7; }
  .subtitle { font-size: 13px; color: #6c7086; max-width: 340px; }
  .tags { display: flex; gap: 6px; margin-top: 4px; }
  .tag {
    font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .tag-js { background: #f9e2af; color: #1e1e2e; }
  .tag-py { background: #a6e3a1; color: #1e1e2e; }
  .tag-sql { background: #f38ba8; color: #1e1e2e; }
  .tag-go { background: #94e2d5; color: #1e1e2e; }
  .tag-rs { background: #fab387; color: #1e1e2e; }
</style>
</head>
<body>
  <div class="icon">&lt;/&gt;</div>
  <h1>Snippet <span>Vault</span></h1>
  <p class="subtitle">Save, tag, and search code snippets locally.</p>
  <div class="tags">
    <div class="tag tag-js">JS</div>
    <div class="tag tag-py">PY</div>
    <div class="tag tag-sql">SQL</div>
    <div class="tag tag-go">GO</div>
    <div class="tag tag-rs">RUST</div>
  </div>
</body>
</html>
