<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=440, height=280">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap');
  body {
    width: 440px; height: 280px; overflow: hidden;
    background: linear-gradient(135deg, #1e1e2e 0%, #181825 100%);
    font-family: 'Inter', sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; text-align: center;
  }
  .icon {
    font-family: 'JetBrains Mono', monospace;
    font-size: 36px; font-weight: 700; color: #89b4fa;
  }
  h1 { font-size: 28px; font-weight: 800; color: #cdd6f4; }
  h1 span { color: #89b4fa; }
  .subtitle { font-size: 13px; color: #6c7086; max-width: 340px; }
  .tags { display: flex; gap: 6px; margin-top: 4px; }
  .tag {
    font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .tag-get { background: #a6e3a1; color: #1e1e2e; }
  .tag-post { background: #89b4fa; color: #1e1e2e; }
  .tag-put { background: #f9e2af; color: #1e1e2e; }
  .tag-del { background: #f38ba8; color: #1e1e2e; }
  .tag-patch { background: #cba6f7; color: #1e1e2e; }
</style>
</head>
<body>
  <div class="icon">{ }</div>
  <h1>API <span>Echo</span></h1>
  <p class="subtitle">A focused network inspector for DevTools.</p>
  <div class="tags">
    <div class="tag tag-get">GET</div>
    <div class="tag tag-post">POST</div>
    <div class="tag tag-put">PUT</div>
    <div class="tag tag-del">DEL</div>
    <div class="tag tag-patch">PATCH</div>
  </div>
</body>
</html>
