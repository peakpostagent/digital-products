<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=440, height=280">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600;800&display=swap');
  body {
    width: 440px; height: 280px; overflow: hidden;
    background: linear-gradient(135deg, #1e1e2e 0%, #181825 100%);
    font-family: 'Inter', sans-serif;
    display: flex; align-items: center; justify-content: center;
    gap: 24px; padding: 24px 30px;
  }
  .left { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  h1 { font-size: 22px; font-weight: 800; color: #cdd6f4; line-height: 1.15; }
  h1 span { color: #89b4fa; }
  .subtitle { font-size: 11px; color: #6c7086; line-height: 1.4; }
  .right { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  /* Stacked layers icon */
  .layers { display: flex; flex-direction: column; gap: 4px; align-items: center; }
  .layer {
    border-radius: 6px; display: flex; align-items: center;
    justify-content: flex-end; padding-right: 8px;
    font-family: monospace; font-size: 11px; font-weight: 700; color: #fff;
  }
  .l1 { width: 90px; height: 28px; background: rgba(59,130,246,0.8); }
  .l2 { width: 100px; height: 28px; background: rgba(168,85,247,0.8); }
  .l3 { width: 110px; height: 28px; background: rgba(236,72,153,0.8); }
  .l4 { width: 120px; height: 28px; background: rgba(34,197,94,0.8); }
</style>
</head>
<body>
  <div class="left">
    <h1>Z-Index<br><span>Inspector</span></h1>
    <p class="subtitle">Visualize z-index layers, stacking contexts, and conflicts.</p>
  </div>
  <div class="right">
    <div class="layers">
      <div class="layer l1">z:9999</div>
      <div class="layer l2">z:100</div>
      <div class="layer l3">z:10</div>
      <div class="layer l4">z:1</div>
    </div>
  </div>
</body>
</html>
