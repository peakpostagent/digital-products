<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=340">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <span class="title">Z-Index Inspector</span>
      <span class="count-badge" id="count-badge">--</span>
    </div>
    <p class="subtitle">Visualize z-index values and stacking contexts on this page.</p>

    <button class="btn btn-primary" id="btn-activate">Scan &amp; Inspect</button>

    <div class="toggle-row" id="toggle-overlay-row">
      <span>Show Overlay Badges</span>
      <div class="toggle-dot" id="toggle-overlay-dot"></div>
    </div>

    <div class="toggle-row" id="toggle-sidebar-row">
      <span>Sidebar Panel</span>
      <div class="toggle-dot" id="toggle-sidebar-dot"></div>
    </div>

    <button class="btn btn-secondary" id="btn-rescan">Re-scan Page</button>

    <div class="status" id="status-msg"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
