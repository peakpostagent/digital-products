<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=440, height=280">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
  body {
    width: 440px; height: 280px; overflow: hidden;
    background: linear-gradient(135deg, #1e1e2e 0%, #181825 100%);
    font-family: 'Inter', sans-serif;
    display: flex; align-items: center; justify-content: center;
    padding: 30px;
  }
  .wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; text-align: center; }
  .icon {
    width: 56px; height: 56px; border-radius: 12px;
    background: linear-gradient(135deg, #fab387 0%, #e64553 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Consolas', monospace; font-size: 20px; font-weight: 900; color: #1e1e2e;
  }
  h1 { font-size: 26px; font-weight: 800; color: #cdd6f4; line-height: 1.2; }
  h1 span { color: #fab387; }
  .subtitle { font-size: 13px; color: #6c7086; line-height: 1.4; max-width: 340px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="icon"><span>/.*/</span></div>
    <h1>Regex <span>Tester</span></h1>
    <p class="subtitle">Real-time regex testing with match highlighting, group captures, replace preview, and saved patterns.</p>
  </div>
</body>
</html>
