<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 640px;
    background: #1E293B;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
  }
  .left {
    padding: 0 100px;
    flex: 1;
  }
  .logo {
    font-size: 72px;
    font-weight: 700;
    color: #10B981;
    letter-spacing: -1px;
    line-height: 1;
  }
  .tagline {
    font-size: 22px;
    color: #94A3B8;
    margin-top: 20px;
    font-weight: 400;
    line-height: 1.5;
  }
  .right {
    width: 480px;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    padding-right: 60px;
  }
  .icon-card {
    width: 120px;
    height: 140px;
    background: #273548;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  /* Code icon </> */
  .icon-code {
    font-size: 36px;
    color: #10B981;
    font-weight: 700;
    font-family: 'Courier New', monospace;
  }
  /* Grid icon (spreadsheet) */
  .icon-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
    width: 40px;
    height: 40px;
  }
  .icon-grid span {
    background: #F97316;
    border-radius: 3px;
  }
  /* AI sparkle icon */
  .icon-ai {
    position: relative;
    width: 40px;
    height: 40px;
  }
  .sparkle {
    position: absolute;
    background: #F97316;
  }
  .sparkle-v {
    width: 6px;
    height: 40px;
    left: 17px;
    top: 0;
    border-radius: 3px;
  }
  .sparkle-h {
    width: 40px;
    height: 6px;
    left: 0;
    top: 17px;
    border-radius: 3px;
  }
  .sparkle-d1 {
    width: 5px;
    height: 28px;
    left: 18px;
    top: 6px;
    border-radius: 3px;
    transform: rotate(45deg);
  }
  .sparkle-d2 {
    width: 5px;
    height: 28px;
    left: 18px;
    top: 6px;
    border-radius: 3px;
    transform: rotate(-45deg);
  }
  .sparkle-center {
    width: 12px;
    height: 12px;
    background: #F97316;
    border-radius: 50%;
    left: 14px;
    top: 14px;
  }
  .icon-label {
    font-size: 12px;
    color: #64748B;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .bottom-accent {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #10B981, #F97316);
  }
</style>
</head>
<body>
  <div class="left">
    <div class="logo">PeakPost</div>
    <div class="tagline">Templates, tools & workflows<br>for indie creators</div>
  </div>
  <div class="right">
    <div class="icon-card">
      <div class="icon-code">&lt;/&gt;</div>
      <div class="icon-label">Code</div>
    </div>
    <div class="icon-card">
      <div class="icon-grid">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
      </div>
      <div class="icon-label">Sheets</div>
    </div>
    <div class="icon-card">
      <div class="icon-ai">
        <div class="sparkle sparkle-v"></div>
        <div class="sparkle sparkle-h"></div>
        <div class="sparkle sparkle-d1"></div>
        <div class="sparkle sparkle-d2"></div>
        <div class="sparkle sparkle-center"></div>
      </div>
      <div class="icon-label">AI</div>
    </div>
  </div>
  <div class="bottom-accent"></div>
</body>
</html>
