<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 400px;
    height: 400px;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
  }
  .circle {
    width: 380px;
    height: 380px;
    background: #0F172A;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .monogram {
    font-size: 120px;
    font-weight: 700;
    color: #38BDF8;
    letter-spacing: 4px;
    line-height: 1;
  }
  .ring {
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    border: 2px solid #1E293B;
  }
</style>
</head>
<body>
  <div class="circle">
    <div class="ring"></div>
    <div class="monogram">PP</div>
  </div>
</body>
</html>
