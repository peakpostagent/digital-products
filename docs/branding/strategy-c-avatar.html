<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 400px;
    height: 400px;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
  }
  .circle {
    width: 380px;
    height: 380px;
    background: #1E293B;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  /* Mountain peak outline */
  .mountain {
    position: relative;
    margin-top: 30px;
  }
  .peak-outline {
    width: 0;
    height: 0;
    border-left: 80px solid transparent;
    border-right: 80px solid transparent;
    border-bottom: 140px solid transparent;
    position: relative;
  }
  /* Create outline effect with pseudo-elements */
  .peak-left {
    position: absolute;
    width: 4px;
    height: 162px;
    background: #10B981;
    transform: rotate(-30deg);
    transform-origin: bottom center;
    bottom: 0;
    left: 50%;
    margin-left: -2px;
    border-radius: 2px;
  }
  .peak-right {
    position: absolute;
    width: 4px;
    height: 162px;
    background: #10B981;
    transform: rotate(30deg);
    transform-origin: bottom center;
    bottom: 0;
    left: 50%;
    margin-left: -2px;
    border-radius: 2px;
  }
  .peak-base {
    position: absolute;
    width: 168px;
    height: 4px;
    background: #10B981;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    border-radius: 2px;
  }
  /* Orange sun/sparkle at the top */
  .sun {
    position: absolute;
    top: -24px;
    left: 50%;
    transform: translateX(-50%);
    width: 28px;
    height: 28px;
    background: #F97316;
    border-radius: 50%;
    box-shadow: 0 0 20px rgba(249, 115, 22, 0.5), 0 0 40px rgba(249, 115, 22, 0.2);
  }
  /* Sparkle rays */
  .ray {
    position: absolute;
    background: #F97316;
    border-radius: 2px;
  }
  .ray-1 {
    width: 3px; height: 14px;
    top: -40px; left: 50%; margin-left: -1.5px;
  }
  .ray-2 {
    width: 14px; height: 3px;
    top: -17px; left: -14px;
  }
  .ray-3 {
    width: 14px; height: 3px;
    top: -17px; right: -14px;
  }
  .ray-4 {
    width: 3px; height: 10px;
    top: -35px; left: -8px;
    transform: rotate(-45deg);
  }
  .ray-5 {
    width: 3px; height: 10px;
    top: -35px; right: -8px;
    transform: rotate(45deg);
  }
</style>
</head>
<body>
  <div class="circle">
    <div class="mountain">
      <div class="peak-left"></div>
      <div class="peak-right"></div>
      <div class="peak-base"></div>
      <div class="sun">
        <div class="ray ray-1"></div>
        <div class="ray ray-2"></div>
        <div class="ray ray-3"></div>
        <div class="ray ray-4"></div>
        <div class="ray ray-5"></div>
      </div>
    </div>
  </div>
</body>
</html>
