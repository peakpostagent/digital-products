<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 640px;
    background: #0F172A;
    font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    position: relative;
  }
  .dot-grid {
    position: absolute;
    top: 0; right: 0;
    width: 560px;
    height: 640px;
    background-image: radial-gradient(circle, #1E293B 1px, transparent 1px);
    background-size: 32px 32px;
    opacity: 0.6;
  }
  .content {
    position: relative;
    z-index: 1;
    padding: 140px 100px;
  }
  .logo {
    font-size: 72px;
    font-weight: 700;
    color: #F8FAFC;
    letter-spacing: -2px;
    line-height: 1;
  }
  .accent-line {
    width: 80px;
    height: 4px;
    background: #38BDF8;
    margin-top: 24px;
    border-radius: 2px;
  }
  .tagline {
    font-size: 26px;
    color: #94A3B8;
    margin-top: 28px;
    font-weight: 400;
    letter-spacing: -0.3px;
  }
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #38BDF8, #0F172A);
  }
</style>
</head>
<body>
  <div class="dot-grid"></div>
  <div class="content">
    <div class="logo">PeakPost</div>
    <div class="accent-line"></div>
    <div class="tagline">Developer tools & templates that just work.</div>
  </div>
  <div class="bottom-bar"></div>
</body>
</html>
