<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 400px;
    height: 400px;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
  }
  .circle {
    width: 380px;
    height: 380px;
    background: linear-gradient(135deg, #7C3AED 0%, #2563EB 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  /* Mountain peak icon — simple triangle */
  .peak {
    width: 0;
    height: 0;
    border-left: 90px solid transparent;
    border-right: 90px solid transparent;
    border-bottom: 150px solid #FFFFFF;
    position: relative;
    margin-top: -20px;
  }
  /* Snow cap — small inverted triangle at top */
  .peak::after {
    content: '';
    position: absolute;
    top: 20px;
    left: -30px;
    width: 0;
    height: 0;
    border-left: 30px solid transparent;
    border-right: 30px solid transparent;
    border-bottom: 50px solid rgba(124, 58, 237, 0.3);
  }
  /* Second smaller peak */
  .peak-small {
    position: absolute;
    bottom: 115px;
    right: 100px;
    width: 0;
    height: 0;
    border-left: 45px solid transparent;
    border-right: 45px solid transparent;
    border-bottom: 75px solid rgba(255,255,255,0.4);
  }
</style>
</head>
<body>
  <div class="circle">
    <div class="peak-small"></div>
    <div class="peak"></div>
  </div>
</body>
</html>
